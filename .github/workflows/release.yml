name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64, osx-arm64, linux-x64, linux-arm64, linux-musl-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish InternetSearchMCP/InternetSearchMCP.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o publish/${{ matrix.rid }}

      - name: Archive artifact
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../InternetSearchMCP-${{ matrix.rid }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetSearchMCP-${{ matrix.rid }}
          path: InternetSearchMCP-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
